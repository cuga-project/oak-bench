[pytest]
# Pytest configuration for Oak Health Insurance API tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider

# Markers for organizing tests
markers =
    claims: Tests for claims-related endpoints
    coverage: Tests for coverage and plan endpoints
    benefits: Tests for benefits search and details
    find_care: Tests for provider search endpoints
    medical_info: Tests for medical information endpoint
    billing: Tests for billing and payment endpoints
    member: Tests for member profile and preferences
    slow: Tests that take longer to execute
    integration: Integration tests requiring full app

# Test paths
testpaths = .
pythonpath = ../src

# Minimum Python version
minversion = 3.8

# Console output
console_output_style = progress

# Log settings
log_cli = false
log_cli_level = INFO
